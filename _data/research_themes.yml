- key: aiefficiency
  name: AI Efficiency
  url: /pubs/#tag=AI efficiency
  desc: >
    AI workloads are growing in compute and memory demands far faster than hardware capabilities can keep up. We are developing systems techniques and AI-system interfaces that bridge this efficiency gap.
  highlights:
    - strata
    - jit_planner
    - taper
- key: scaleoutAI
  name: Scale-out AI systems
  url: /pubs/#tag=scale-out AI
  desc: >
    Today’s AI infrastructure, rooted in HPC paradigms, is inflexible and expensive. We are designing AI systems around scale-out principles to improve scalability, resilience, and cost effectiveness.
  highlights:
    - raidserve
    - moevement
    - recycle_resilient_training_of_large_dnns_using_pipeline_adaptation
- key: aiforsystems
  name: AI for Systems
  url: /pubs/#tag=AI for systems
  desc: >
    We are applying AI techniques to design and optimize both hardware and software systems. We place particular emphasis on testing and verification to ensure AI-designed systems are trustworthy and robust.
  highlights:
    - sol_execbench_speed_of_light_benchmarking_for_real_world_gpu_kernels_against_hardware_limits
    - kernelblaster_continual_cross_task_cuda_optimization_via_memory_augmented_in_context_reinforcement_learning
    - proofwright_towards_agentic_formal_verification_of_cuda
- key: hwswcodesign
  name: HW/SW co-design
  url: /pubs/#tag=HW/SW co-design
  desc: >
    We are co-designing hardware, system software, and applications to improve the efficiency of cloud infrastructure, frequently using AI techniques to automate optimization.
  highlights:
    - symi
    - proofwright_towards_agentic_formal_verification_of_cuda
    - high_throughput_and_flexible_networking
